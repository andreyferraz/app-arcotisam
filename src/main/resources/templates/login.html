<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
  <title>Login — Arcotisam</title>
</head>

<body th:replace="~{layout :: layout('Login — Arcotisam', ~{::loginContent})}">
<div th:fragment="loginContent">
  <section class="page-section active login-page" id="login" data-section="login">
    <div class="container login-layout">
      <div class="login-brand-card">
        <div class="login-brand-badge">
          <img th:src="@{/img/logo3.png}" alt="Logo ARCOTISAM" />
        </div>
        <span class="eyebrow">Acesso restrito</span>
        <h1>Entrar no painel administrativo</h1>
        <p>
          Faça login para acessar as áreas administrativas e gerenciar o conteúdo da ARCOTISAM.
        </p>
      </div>

      <div class="login-form-card">
        <h2>Login</h2>
        <p>Use suas credenciais para entrar no sistema.</p>

        <div class="login-alert error" th:if="${param.error}">
          Usuário ou senha inválidos.
        </div>
        <div class="login-alert success" th:if="${param.logout}">
          Você saiu do sistema com sucesso.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <label>
            Usuário
            <input type="text" name="username" placeholder="Seu usuário" autocomplete="username" required>
          </label>

          <label>
            Senha
            <input type="password" name="password" placeholder="Sua senha" autocomplete="current-password" required>
          </label>

          <label class="login-remember">
            <input type="checkbox" name="remember-me">
            <span>Manter conectado</span>
          </label>

          <button class="btn btn-primary full login-submit" type="submit">
            <span aria-hidden="true">🔐</span>
            <span>Entrar</span>
          </button>
        </form>
      </div>
    </div>
  </section>
</div>
</body>
</html>
