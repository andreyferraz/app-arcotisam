<!DOCTYPE html>
<html lang="pt-BR"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	th:fragment="layout(title, content)">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<title th:text="${title}">ARCOTISAM</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

	<link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body>
	<header class="site-header" id="topo">
		<nav class="navbar container">
			<a class="brand" th:href="@{/}" aria-label="ARCOTISAM - Página inicial">
				<img th:src="@{/img/logo3.png}" alt="Logo ARCOTISAM" />
			</a>

			<button class="menu-toggle" id="menuToggle" type="button" aria-label="Abrir menu" aria-expanded="false">
				<span></span>
				<span></span>
				<span></span>
			</button>

			<div class="nav-links" id="navLinks">
				<a th:href="@{/}" class="nav-link">Home</a>
				<a th:href="@{/sobre}" class="nav-link">Sobre</a>
				<a th:href="@{/loja}" class="nav-link">Loja</a>
				<a th:href="@{/associados}" class="nav-link">Associados</a>
				<a th:href="@{/contato}" class="nav-link">Contato</a>
				<a sec:authorize="isAnonymous()" th:href="@{/login}" class="nav-link admin-link" aria-label="Entrar no painel admin">
					<span aria-hidden="true">🔐</span>
					<span>Login Admin</span>
				</a>

				<a sec:authorize="hasRole('ADMIN_MASTER')" th:href="@{/admin}" class="nav-link admin-link" aria-label="Painel admin">
					<span aria-hidden="true">🔐</span>
					<span>Painel Admin</span>
				</a>

				<a sec:authorize="hasRole('ARTESAO')" th:href="@{/artesao}" class="nav-link admin-link" aria-label="Painel artesão">
					<span aria-hidden="true">🔨</span>
					<span>Painel</span>
				</a>

				<form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<button type="submit" class="nav-link admin-link logout-button" aria-label="Sair">
						<span aria-hidden="true">🔓</span>
						<span>Sair</span>
					</button>
				</form>
				<a th:href="@{/carrinho}" class="cart-link nav-link">
					Carrinho
					<span class="cart-count" id="cartCount">0</span>
				</a>
			</div>
		</nav>
	</header>

	<main id="main-content" th:replace="${content}">
		Conteúdo da página
	</main>

	<footer class="site-footer">
		<div class="container footer-content">
			<img th:src="@{/img/logo.png}" alt="ARCOTISAM" />
			<p>
				© <span id="currentYear"></span> ARCOTISAM.
				Desenvolvido por <a href="https://www.andreyferraz.com.br" target="_blank" rel="noopener noreferrer">Andrêy Ferraz</a>.
			</p>
		</div>
	</footer>

	<script th:src="@{/js/script.js}"></script>
</body>
</html>
