<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
  <title>Associados — Arcotisam</title>
</head>

<body th:replace="~{layout :: layout('Associados — Arcotisam', ~{::associadosContent})}">
<div th:fragment="associadosContent">
<section class="page-section active" id="associados" data-section="associados">
  <div class="container page-header">
    <span class="eyebrow">Nossa rede</span>
    <h2>Artesãos Associados</h2>
    <p>Conheça os artesãos associados da ARCOTISAM</p>
  </div>

  <div class="container member-grid" th:if="${!#lists.isEmpty(artesaos)}">
    <article class="member-card" th:each="artesao : ${artesaos}">
      <div class="member-avatar member-photo" th:if="${artesao.fotoUrl != null and !#strings.isEmpty(artesao.fotoUrl)}">
        <img th:src="@{|/uploads/${artesao.fotoUrl}|}" th:alt="${'Foto de ' + artesao.nome}">
      </div>
      <div class="member-avatar" th:unless="${artesao.fotoUrl != null and !#strings.isEmpty(artesao.fotoUrl)}">ARC</div>
      <h3 th:text="${artesao.nome}">Nome do artesão</h3>
      <p th:text="${artesao.descricao}">Descrição do artesão</p>
      <span th:text="${artesao.whatsapp != null and !#strings.isEmpty(artesao.whatsapp) ? artesao.whatsapp : artesao.totalProdutos + ' produtos'}">Contato</span>
      <p style="margin-top: 14px; font-size: 0.95rem;">
        <a th:href="@{/loja(artesaoId=${artesao.id})}">Ver produtos</a>
      </p>
    </article>
  </div>

  <div class="container page-header" th:if="${#lists.isEmpty(artesaos)}">
    <p>Nenhum artesão foi cadastrado ainda.</p>
  </div>

</section>
</div>
</body>
</html>
