<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
  <title>Painel Artesão — Arcotisam</title>
</head>

<body th:replace="~{layout :: layout('Painel Artesão', ~{::artesaoContent})}">

<div th:fragment="artesaoContent">
  <section class="page-section active container">
    <h2>Painel do Artesão — <span th:text="${artesao.nome}">Nome do Artesão</span></h2>

    <div th:if="${mensagem}" class="alert alert-warning" th:text="${mensagem}"></div>
    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <div class="card">
      <h3>Meus Produtos</h3>

      <form th:action="@{/artesao/produtos/salvar}" method="post" enctype="multipart/form-data" class="product-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="id" id="produtoId" />
        <div>
          <label>Nome</label>
          <input type="text" name="nome" required />
        </div>
        <div>
          <label>Descrição</label>
          <input type="text" name="descricao" />
        </div>
        <div>
          <label>Preço</label>
          <input type="number" step="0.01" name="preco" />
        </div>
        <div>
          <label>Imagem</label>
          <input type="file" name="imagem" accept="image/*" />
        </div>
        <div>
          <button class="btn btn-primary" type="submit" id="produtoSubmit">Cadastrar Produto</button>
          <button class="btn" type="button" id="produtoCancel" style="display:none; margin-left:8px">Cancelar</button>
        </div>
      </form>

      <div style="margin-top:16px; margin-bottom:8px;">
        <label for="produtoSearch" style="font-weight:700; margin-right:8px">Buscar produtos</label>
        <input type="search" id="produtoSearch" placeholder="Pesquisar por nome..." style="padding:8px 10px; border-radius:8px; border:1px solid rgba(0,0,0,0.08); width:60%" />
      </div>

      <table id="produtosTable">
        <thead>
          <tr>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="produtosTbody">
          <tr th:each="p : ${produtos}">
            <td>
              <img th:if="${p.imagemUrl != null}" th:src="@{|/uploads/${p.imagemUrl}|}" th:alt="${p.nome}" class="product-thumb" />
              <span th:if="${p.imagemUrl == null}">—</span>
            </td>
            <td th:text="${p.nome}"></td>
            <td th:text="${p.preco}"></td>
            <td>
              <button type="button" class="btn btn-secondary edit-btn"
                      th:attr="data-id=${p.id},data-nome=${p.nome},data-descricao=${p.descricao},data-preco=${p.preco}">Editar</button>
              <form th:action="@{/artesao/produtos/{id}/excluir(id=${p.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-danger">Excluir</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="pagination" id="produtosPagination" aria-label="Paginação de produtos"></div>
    </div>

    <div class="card">
      <h3>Controle de Caixa</h3>
      <form th:action="@{/artesao/lancamentos/salvar}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div>
          <label>Tipo</label>
          <select name="tipo">
            <option value="ENTRADA">Entrada</option>
            <option value="SAIDA">Saída</option>
          </select>
        </div>
        <div>
          <label>Descrição</label>
          <input type="text" name="descricao" />
        </div>
        <div>
          <label>Valor</label>
          <input type="number" step="0.01" name="valor" required />
        </div>
        <div>
          <button class="btn btn-primary" type="submit">Registrar</button>
        </div>
      </form>

      <h4>Lançamentos Recentes</h4>
      <table>
        <thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Valor</th></tr></thead>
        <tbody>
          <tr th:each="m : ${movimentacoes}">
            <td th:text="${#temporals.format(m.dataHora, 'dd/MM/yyyy')}"></td>
            <td th:text="${m.tipo}"></td>
            <td th:text="${m.descricao}"></td>
            <td th:text="${m.valor}"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h3>Alterar Senha</h3>
      <form th:action="@{/artesao/senha/alterar}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div>
          <label>Nova senha</label>
          <input type="password" name="novaSenha" required />
        </div>
        <div>
          <button class="btn btn-primary" type="submit">Alterar senha</button>
        </div>
      </form>
    </div>

  </section>
</div>



</body>
</html>
